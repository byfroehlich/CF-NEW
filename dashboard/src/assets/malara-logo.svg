<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 112" fill="none">
  <defs>
    <linearGradient id="ml" x1="0" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7B28E8"/>
      <stop offset="50%"  stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#EC1E85"/>
    </linearGradient>
  </defs>
  <!-- Left loop -->
  <ellipse cx="38" cy="58" rx="20" ry="41" stroke="url(#ml)" stroke-width="10.5" stroke-linecap="round" transform="rotate(-18 38 58)"/>
  <!-- Right loop -->
  <ellipse cx="70" cy="58" rx="20" ry="41" stroke="url(#ml)" stroke-width="10.5" stroke-linecap="round" transform="rotate(18 70 58)"/>
  <!-- Wordmark -->
  <text x="122" y="82" font-family="'Poppins','Nunito','Inter',system-ui,sans-serif" font-size="74" font-weight="800" letter-spacing="-2" fill="url(#ml)">Malara</text>
</svg>
